name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # [sat] pulls in python-sat so the differential-SAT and watched-literals
          # tests actually run in CI; without it they importorskip and silently pass.
          pip install -e ".[dev,sat]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Typecheck (mypy)
        run: mypy
      - name: Test (pytest)
        # -ra surfaces any skips so a silently-skipped suite is visible in the log.
        run: pytest -ra

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
